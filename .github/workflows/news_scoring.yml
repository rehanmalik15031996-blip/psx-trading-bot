name: News sentiment scoring

# Runs the Claude-scored news pipeline several times per day so the
# 24h macro tilt in the briefing always reflects the latest headlines.
#
# Schedule (UTC):
#   02:00 UTC = 07:00 PKT   morning run (pre-open news)
#   08:00 UTC = 13:00 PKT   midday run (intraday news)
#   13:00 UTC = 18:00 PKT   evening run (post-close + global close news)

on:
  schedule:
    - cron: '0 2 * * 1-5'
    - cron: '0 8 * * 1-5'
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # required so `gh workflow run predictions.yml` (the
                     # shock-retrigger step at the bottom of this file) can
                     # dispatch another workflow. Without `actions: write`
                     # the default GITHUB_TOKEN returns HTTP 403 with
                     # "Resource not accessible by integration" and the
                     # shock retrigger silently never fires.

concurrency:
  group: news-scoring
  cancel-in-progress: false

jobs:
  score-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-ci.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-ci.txt

      - name: Score fresh headlines
        run: python scripts/score_news_sentiment.py --per-feed 8 --batch 8

      - name: Detect intraday news shocks
        id: shock
        run: |
          set +e
          python scripts/check_news_shocks.py
          rc=$?
          if [ "$rc" -eq 7 ]; then
            echo "shock=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$rc" -eq 0 ]; then
            echo "shock=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            exit "$rc"
          fi

      - name: Commit scored news (and shock log)
        run: |
          git config user.name  "psx-bot"
          git config user.email "psx-bot@users.noreply.github.com"
          git add data/news/scored_news.parquet \
                  data/news/shock_log.json \
                  data/_health/news_scoring.json \
                  data/_health/_history_news_scoring.parquet 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "data: news sentiment $(date -u +%FT%H%MZ)"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push attempt $i rejected; rebasing on latest main..."
            git pull --rebase --autostash origin main || exit 1
            sleep $((i * 2))
          done
          echo "Push failed after 5 attempts."
          exit 1

      - name: Dispatch predictions on shock
        if: steps.shock.outputs.shock == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Shock detected — dispatching predictions workflow now."
          gh workflow run predictions.yml --ref "${GITHUB_REF#refs/heads/}"
