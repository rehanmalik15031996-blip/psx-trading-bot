name: Macro KPIs (SBP rates + KSE-100 + CPI)

# Refreshes the daily macroeconomic-KPI time series consumed by the
# sector-aware macro impact engine. We capture:
#
#  - SBP daily snapshot: policy rate, KIBOR, T-bill / PIB yield curves,
#    FX reserves
#  - KSE-100 daily close (from PSX DPS indices page)
#  - Pakistan CPI YoY % (from Trading Economics, fallback PBS)
#
# These feed `brain/macro_impact.py` which derives industry-specific
# drivers like "T-bill 3M trading above policy rate", "FX reserves in
# stress band", "KSE-100 in risk-on regime", "CPI cooling toward target",
# and applies them to per-sector and per-stock scores.
#
# Cadence: TWO weekday runs.
#
#   08:30 PKT (03:30 UTC) — pre-open snapshot. Critical for catching
#                           overnight KIBOR / T-bill repricing before
#                           predictions.yml fires at 09:20 PKT (the
#                           April 28 +50 bps post-MPC KIBOR jump
#                           would have been invisible to predictions
#                           without this run).
#
#   17:00 PKT (12:00 UTC) — EOD final snapshot, after PSX close
#                           and after the SBP end-of-day feed.
#
# The script is idempotent on date — the second run of the day
# overwrites the morning row in place.

on:
  schedule:
    - cron: '30 3 * * 1-5'      # 08:30 PKT, Mon-Fri (pre-open)
    - cron: '0 12 * * 1-5'      # 17:00 PKT, Mon-Fri (EOD)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macro-kpis
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-ci.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-ci.txt

      - name: Refresh SBP rates + KSE-100 + CPI
        run: python scripts/refresh_macro_kpis.py
        # If any single source fails, the script logs and continues —
        # it's fine for CPI to be stale on days PBS / TradingEconomics
        # are unreachable; the engine already handles missing data.

      - name: Commit updates
        run: |
          git config user.name  "psx-bot"
          git config user.email "psx-bot@users.noreply.github.com"
          git add data/macro/sbp_rates.parquet \
                  data/macro/kse100.parquet \
                  data/macro/cpi_pakistan.parquet \
                  data/macro/_policy_rate_history.json
          if git diff --cached --quiet; then
            echo "No changes (already up to date for today)."
            exit 0
          fi
          git commit -m "data: macro KPI refresh $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push attempt $i rejected; rebasing..."
            git pull --rebase --autostash origin main || exit 1
            sleep $((i * 2))
          done
          echo "Push failed after 5 attempts."
          exit 1
