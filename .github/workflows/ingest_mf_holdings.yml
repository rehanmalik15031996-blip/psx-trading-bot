name: Mutual Funds Equity Holdings (AHL monthly)

# Refreshes the Pakistani mutual-funds "smart money" lens by
# downloading the latest AHL Mutual Funds Equity Holdings PDF and
# parsing it into:
#
#   data/flows/mutual_fund_holdings.parquet     (per fund x stock x month)
#   data/flows/mf_top_holdings_summary.parquet  (top-30 universe summary)
#   data/raw/mf_holdings/*.pdf                  (PDF archive)
#
# These feed:
#   - brain/mf_flows.py            (per-stock signals + universe rollups)
#   - brain/playbook.py            (5 mf_* cases that the matcher scores)
#   - brain/master_strategist.py   (Claude's institutional-flows lens)
#   - ui/app.py                    (Today tab MF flows card)
#
# Cadence: 5th of each month at 09:00 PKT (04:00 UTC). AHL typically
# publishes around the 15th-20th covering the previous month, so the
# 5th gives us a cushion for a potential pre-publish PDF AND ensures
# we pick up any late-published prior-month report.
#
# Adding a new month's URL: when a new AHL ObjectId hash is discovered
# (web search or curated), append it to KNOWN_URLS in
# scripts/ingest_ahl_mf_holdings.py. The script auto-detects whether
# the PDF is actually a Mutual Funds Holdings report (vs a Performance
# or MSCI Review report sharing the same URL namespace) and skips
# unrelated PDFs.

on:
  schedule:
    - cron: '0 4 5 * *'      # 5th of each month, 09:00 PKT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest-mf-holdings
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-ci.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-ci.txt

      - name: Download + parse AHL MF Holdings PDFs
        run: python scripts/ingest_ahl_mf_holdings.py
        # Idempotent: PDFs already on disk are skipped; the script
        # only re-parses and upserts the parquets if a new month
        # has been added to the KNOWN_URLS list.

      - name: Validate parquets
        run: python scripts/ingest_ahl_mf_holdings.py --validate

      - name: Commit updates
        run: |
          git config user.name  "psx-bot"
          git config user.email "psx-bot@users.noreply.github.com"
          git add data/flows/mutual_fund_holdings.parquet \
                  data/flows/mf_top_holdings_summary.parquet \
                  data/raw/mf_holdings/_known_urls.json 2>/dev/null || true
          # PDFs themselves are large; add them only if they're new
          git add data/raw/mf_holdings/MutualFundsEquityHoldings-*.pdf 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes (already up to date for this month)."
            exit 0
          fi
          git commit -m "data: AHL MF holdings refresh $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push attempt $i rejected; rebasing..."
            git pull --rebase --autostash origin main || exit 1
            sleep $((i * 2))
          done
          echo "Push failed after 5 attempts."
          exit 1
