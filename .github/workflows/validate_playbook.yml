name: Validate playbook

# Type-check data/playbook/cases.json (and _events.json) on every push
# or PR that touches the playbook layer. Catches:
#   * malformed JSON, duplicate IDs, missing required fields
#   * unknown trigger kinds (typos like 'driver_rate_down' instead of
#     'driver:rate_down')
#   * percentage-shaped reactions that should be fractional
#     (|value| > 1.0 means somebody pasted '+5%' instead of '0.05')
#
# The validator is the same code the live Master Strategist uses, so a
# green CI here means cases.json is loadable in production.

on:
  push:
    paths:
      - 'data/playbook/**'
      - 'brain/playbook.py'
      - '.github/workflows/validate_playbook.yml'
  pull_request:
    paths:
      - 'data/playbook/**'
      - 'brain/playbook.py'
      - '.github/workflows/validate_playbook.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate playbook cases
        run: python -m brain.playbook --validate

      - name: List loaded cases (for logs)
        if: always()
        run: python -m brain.playbook --list

      # Audit gate (added 2026-05-15 per Gap-8 of bias audit):
      # Compare any case modifications against the 5-year backtest. Hard-
      # fails the PR if a case has wrong direction; warns on low-N. This
      # is the deterministic version of the original "every case should
      # be backed by ≥5 historical fires with the correct direction"
      # rule that previously lived only in commit-message conventions.
      - name: Audit cases against backtest (Gap-8 gate)
        if: always()
        run: |
          if [ -f data/_research/backtest_per_case.json ]; then
            python scripts/_validate_case_edit.py
          else
            echo "::warning::backtest_per_case.json missing — gate skipped."
            echo "::warning::Re-run scripts/_research_backtest.py + _research_analyze.py to refresh it."
          fi
