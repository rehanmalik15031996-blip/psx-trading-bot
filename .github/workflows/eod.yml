name: End of day (OHLCV + FIPI + check predictions)

# Runs ~1 hour after PSX close (15:30 PKT = 10:30 UTC).
# 11:30 UTC = 16:30 PKT.
# 1) Refreshes today's OHLCV from PSX DPS for the 15-stock universe so the
#    UI and all downstream tools (ranking, scanner, predictions) see today's
#    close instead of yesterday's.
# 2) Appends today's FIPI flows to the daily cache.
# 3) Scores yesterday's 5-day predictions against actuals (incl. cost-adjusted
#    net return hit-rate). Commits everything back to main.

on:
  schedule:
    - cron: '30 11 * * 1-5'    # 16:30 PKT, Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: eod
  cancel-in-progress: false

jobs:
  eod:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-ci.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-ci.txt

      - name: Refresh OHLCV (today's close for the 15-stock universe)
        run: python scripts/backfill.py
        # Idempotent: overwrites parquet files with the latest full history
        # from PSX DPS (~5y x 15 symbols, runs in ~30-60s). Without this the
        # UI would stay a day behind every single morning.

      - name: Cache today's FIPI flows
        run: python scripts/cache_fipi_daily.py || true
        # Don't fail the whole job if FIPI scrape blips — we still want
        # the prediction check to run.

      - name: Score yesterday's predictions against actuals
        run: python scripts/check_predictions.py

      - name: Commit updates
        run: |
          git config user.name  "psx-bot"
          git config user.email "psx-bot@users.noreply.github.com"
          git add data/ohlcv/ data/flows/fipi_daily.parquet \
                  data/predictions_log.json \
                  data/_health/eod.json \
                  data/_health/_history_eod.parquet 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "data: EOD OHLCV + flows + scorecard $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push attempt $i rejected; rebasing on latest main..."
            git pull --rebase --autostash origin main || exit 1
            sleep $((i * 2))
          done
          echo "Push failed after 5 attempts."
          exit 1

      # If a known earnings date passes today, dispatch the financial
      # results workflow to ingest the new filings within ~24h. Reads
      # the predicted earnings calendar (already cached by the
      # fundamentals workflow) and looks for events dated today or in
      # the last 2 trading days. Best-effort: if the calendar isn't
      # available we silently skip the dispatch.
      - name: Trigger financial-results extractor on earnings days
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python - <<'PY' > /tmp/fired.txt 2>&1
          import json, os, sys
          from datetime import date, timedelta
          from pathlib import Path

          # Earnings calendar can live in either of two cached spots
          # depending on the version of the fundamentals workflow.
          candidates = [
              Path("data/fundamentals/earnings_calendar.json"),
              Path("data/fundamentals/earnings_dates.parquet"),
          ]
          today = date.today()
          window = {today - timedelta(days=d) for d in range(0, 3)}

          fire: list[str] = []
          if candidates[0].exists():
              try:
                  data = json.loads(candidates[0].read_text())
                  for row in data.get("events", []) or []:
                      d = (row.get("next_event_date_utc") or "")[:10]
                      try:
                          dd = date.fromisoformat(d)
                      except Exception:
                          continue
                      if dd in window and row.get("symbol"):
                          fire.append(row["symbol"])
              except Exception as e:
                  print(f"calendar read failed: {e}")
          elif candidates[1].exists():
              try:
                  import pandas as pd
                  df = pd.read_parquet(candidates[1])
                  if "next_event_date_utc" in df.columns:
                      df["d"] = pd.to_datetime(df["next_event_date_utc"]).dt.date
                      hit = df[df["d"].isin(window)]
                      fire = hit["symbol"].dropna().astype(str).tolist()
              except Exception as e:
                  print(f"parquet read failed: {e}")
          print("FIRE_FOR=" + ",".join(sorted(set(fire))))
          PY
          cat /tmp/fired.txt
          FIRE_FOR=$(grep '^FIRE_FOR=' /tmp/fired.txt | sed 's/^FIRE_FOR=//')
          if [ -z "$FIRE_FOR" ]; then
            echo "No earnings events in the last 3 days; skipping dispatch."
            exit 0
          fi
          IFS=','
          for sym in $FIRE_FOR; do
            echo "Dispatching financial-results extractor for $sym..."
            curl -sS -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/dispatches" \
              -d "{\"event_type\":\"earnings-trigger\",\"client_payload\":{\"symbol\":\"$sym\"}}" \
              || echo "  dispatch failed for $sym (continuing)"
          done
