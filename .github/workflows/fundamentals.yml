name: Fundamentals refresh

# Pulls per-stock fundamentals (EPS, BVPS, 5y financials, dividends) for the
# 15-stock universe via yfinance. Drives the sector-aware fair-value model
# in brain/valuation.py.
#
# Fundamental data updates slowly (quarterly filings + annual reports) so we
# only refresh once a week, on Sunday at 02:00 UTC (07:00 PKT). The cache is
# committed to the repo so the local UI and chatbot tools see the latest
# numbers without needing yfinance access at runtime.

on:
  schedule:
    - cron: '0 2 * * 0'       # 07:00 PKT, Sunday
  workflow_dispatch:           # manual "Run now" button in Actions tab

permissions:
  contents: write

concurrency:
  group: fundamentals-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-ci.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-ci.txt

      - name: Refresh fundamentals
        run: python scripts/refresh_fundamentals.py

      - name: Commit updates
        run: |
          git config user.name  "psx-bot"
          git config user.email "psx-bot@users.noreply.github.com"
          git add data/fundamentals/
          if git diff --cached --quiet; then
            echo "No fundamentals changes."
            exit 0
          fi
          git commit -m "data: fundamentals refresh $(date -u +%F)"
          # Retry push up to 5 times with pull-rebase in case another
          # workflow pushed between our commit and push.
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push attempt $i rejected; rebasing on latest main..."
            git pull --rebase --autostash origin main || exit 1
            sleep $((i * 2))
          done
          echo "Push failed after 5 attempts."
          exit 1
