name: Overnight globals

# Runs after US market close and before PSX open.
# 04:00 UTC = 09:00 PKT = 30 minutes before PSX opens.
# We fetch fresh US close + Asia opening levels from yfinance and commit
# the updated overnight_global.parquet so the live/walk-forward
# pipeline and the Streamlit UI have the latest data.

on:
  schedule:
    - cron: '0 4 * * 1-5'      # 09:00 PKT, Mon-Fri
  workflow_dispatch:             # manual "Run now" button in Actions tab

permissions:
  contents: write

concurrency:
  group: overnight-globals
  cancel-in-progress: false

jobs:
  fetch-globals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-ci.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-ci.txt

      - name: Fetch overnight globals
        run: python scripts/fetch_overnight_global.py

      - name: Commit updates
        run: |
          git config user.name  "psx-bot"
          git config user.email "psx-bot@users.noreply.github.com"
          git add data/macro/overnight_global.parquet
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: overnight globals $(date -u +%F)"
            git push
          fi
