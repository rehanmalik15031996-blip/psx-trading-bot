name: Data freshness health check

# The build-failure email pipeline. Reads ``data/_health/*.json``
# and the SLA table in ``config/data_slas.py``; if any workflow has
# breached its red SLA, this workflow exits non-zero — which fires
# GitHub's automatic "workflow failure" email to the repo owner.
#
# Two scheduled runs per weekday:
#   08:40 PKT (03:40 UTC) — 40 minutes before predictions fire,
#                             so a stale macro / news feed is caught
#                             before today's calls are produced.
#   16:05 PKT (11:05 UTC) — 35 minutes after PSX close, catches any
#                             workflow that should have run during
#                             the day but did not.
#
# Manual dispatch and pull_request triggers are also enabled so the
# CI can run a strict check against any branch before merge.

on:
  schedule:
    - cron: '40 3 * * 1-5'      # 08:40 PKT, Mon-Fri (pre-open)
    - cron: '5 11 * * 1-5'      # 16:05 PKT, Mon-Fri (post-close)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-ci.txt'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # Health check only needs pandas / pyarrow for the history
          # parquet read; no API keys required.
          pip install pandas pyarrow

      - name: Evaluate per-workflow SLAs
        run: python scripts/health_check.py
        # Non-zero exit fails the workflow → GitHub sends the repo
        # owner a "workflow failure" email automatically (free, no
        # extra credentials needed). The email subject is the
        # commit / branch + workflow name, which makes it
        # immediately scannable.
