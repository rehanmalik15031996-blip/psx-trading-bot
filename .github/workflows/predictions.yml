name: Generate predictions

# Runs after overnight globals + macro series + macro KPIs morning
# refresh + the daily health check have all completed.
# 04:20 UTC = 09:20 PKT = 12 minutes before PSX opens.
#
# Pre-open chain order (PKT):
#   06:55 macro_series       (commodities + FX)
#   07:00 news_scoring       (batch 1)
#   08:30 macro_kpis         (morning SBP / KIBOR / T-bills snapshot)
#   09:00 overnight          (US / Asia / FX globals)
#   09:10 health_check       (fails build if any feed is stale)
#   09:20 predictions        <-- here, reads everything above
#
# Was 09:15 PKT but bumped 5 minutes so the 09:10 health-check has
# time to complete before predictions consume the data.

on:
  schedule:
    - cron: '20 4 * * 1-5'     # 09:20 PKT, Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-predictions
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-ci.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements-ci.txt

      - name: Generate today's predictions
        run: python scripts/generate_predictions.py

      - name: Commit predictions log
        run: |
          git config user.name  "psx-bot"
          git config user.email "psx-bot@users.noreply.github.com"
          git add data/predictions_log.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "data: predictions $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push attempt $i rejected; rebasing on latest main..."
            git pull --rebase --autostash origin main || exit 1
            sleep $((i * 2))
          done
          echo "Push failed after 5 attempts."
          exit 1
